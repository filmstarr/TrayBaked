name: DotNet Core Build

on:
  push:
    branches: main
  
env:
  version: ${{ vars.MajorVersion }}.${{ vars.MinorVersion }}.${{ github.run_number }}

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4.1.0
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Navigate to Workspace
      run: cd $GITHUB_WORKSPACE

    - name: Version Patcher
      run: |
        $csprojs = Get-ChildItem -Recurse | Where-Object {$_.Name -clike "*.csproj"}
        foreach ($csproj in $csprojs)
        {
          $versions = Select-Xml -Path $csproj.FullName -XPath "//Version"
          foreach ($version in $versions){
            $version.Node.InnerText = '${{ env.version }}'
          }
          $versionPrefixes = Select-Xml -Path $csproj.FullName -XPath "//VersionPrefix"
          foreach ($versionPrefix in $versionPrefixes){
            $version.Node.InnerText = '${{ env.version }}'
          }

          if ($versions -ne $null)
          {
            $versions.Node.OwnerDocument.Save($csproj.FullName)
          }
          elseif ($versionPrefixes -ne $null)
          {
            $versionPrefixes.Node.OwnerDocument.Save($csproj.FullName)
          }
        }

    - name: Build Solution
      run: |
        foreach ($project in '${{ vars.Projects }}'.Split([Environment]::NewLine))
        {
          if (![string]::IsNullOrWhiteSpace($project))
          {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($project)
            dotnet publish $project `
              -c Release `
              -r win-x64 `
              --self-contained true `
              /p:PublishSingleFile=true `
              --output publish/$name
          }
        }

    - name: Prepare Artifacts
      if: vars.Artifacts != '_'
      run: |
        foreach ($artifact in '${{ vars.Artifacts }}'.Split([Environment]::NewLine))
        {
          if (![string]::IsNullOrWhiteSpace($artifact))
          {
            $artifactParts = $artifact.Split('=>') | Where {![string]::IsNullOrWhiteSpace($_)}
            if ($artifactParts.Count -eq 2)
            {
              $destinationFolder = 'out/artifacts/' + $artifactParts[1].Trim()
              Copy-Item -Path $artifactParts[0].Trim() -Destination $destinationFolder -Recurse
            }
          }
        }

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: vars.Artifacts != '_'
      with:
        name: ${{ github.repository_owner }}_${{ github.event.repository.name }}_${{ github.ref_name }}_${{ env.version }}${{ inputs.nuget-version-suffix }}_artifacts
        path: out/artifacts/
