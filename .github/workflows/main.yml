name: DotNet Core Build

on:
  push:
    branches: main

permissions:
  contents: write

env:
  version: ${{ vars.MajorVersion }}.${{ vars.MinorVersion }}.${{ github.run_number }}

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Patch Project Version
      run: |
        $csproj = "TrayBaked\TrayBaked.csproj"
        $versions = Select-Xml -Path $csproj -XPath "//Version"
        foreach ($version in $versions){
          $version.Node.InnerText = '${{ env.version }}'
        }
        $versionPrefixes = Select-Xml -Path $csproj -XPath "//VersionPrefix"
        foreach ($versionPrefix in $versionPrefixes){
          $versionPrefix.Node.InnerText = '${{ env.version }}'
        }

        if ($versions -ne $null) { $versions.Node.OwnerDocument.Save($csproj) }
        elseif ($versionPrefixes -ne $null) { $versionPrefixes.Node.OwnerDocument.Save($csproj) }

    - name: Build and Publish TrayBaked
      run: |
        dotnet publish TrayBaked\TrayBaked.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          /p:PublishSingleFile=false `
          --output publish/TrayBaked

    - name: Patch Installer Version
      run: |
        $installerPath = "installer\TrayBaked.iss"
        (Get-Content $installerPath) |
          ForEach-Object { $_ -replace '{#MyAppVersion}', '${{ env.version }}' } |
          Set-Content $installerPath

    - name: Install Inno Setup via Chocolatey
      run: choco install innosetup -y

    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\TrayBaked.iss"

    - name: Create GitHub Release with Installer
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.version }}
        name: Release v${{ env.version }}
        body: "Automated release from commit to main."
        draft: false
        prerelease: false
        files: installer/Output/TrayBaked-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}