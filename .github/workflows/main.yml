name: DotNet Core Build

on:
  push:
    branches: main
  
env:
  version: ${{ vars.MajorVersion }}.${{ vars.MinorVersion }}.${{ github.run_number }}

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4.1.0
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Navigate to Workspace
      run: cd $GITHUB_WORKSPACE

    - name: Version Patcher
      run: |
        $csprojs = Get-ChildItem -Recurse | Where-Object {$_.Name -clike "*.csproj"}
        foreach ($csproj in $csprojs)
        {
          $versions = Select-Xml -Path $csproj.FullName -XPath "//Version"
          foreach ($version in $versions){
            $version.Node.InnerText = '${{ env.version }}'
          }
          $versionPrefixes = Select-Xml -Path $csproj.FullName -XPath "//VersionPrefix"
          foreach ($versionPrefix in $versionPrefixes){
            $versionPrefix.Node.InnerText = '${{ env.version }}'
          }

          if ($versions -ne $null)
          {
            $versions.Node.OwnerDocument.Save($csproj.FullName)
          }
          elseif ($versionPrefixes -ne $null)
          {
            $versionPrefixes.Node.OwnerDocument.Save($csproj.FullName)
          }
        }

    - name: Build and Publish Projects
      run: |
        foreach ($project in '${{ vars.Projects }}'.Split([Environment]::NewLine))
        {
          if (![string]::IsNullOrWhiteSpace($project))
          {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($project)
            $outputFolder = "publish/$name"
            dotnet publish $project `
              -c Release `
              -r win-x64 `
              --self-contained false `
              /p:PublishSingleFile=false `
              --output $outputFolder
          }
        }

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      with:
        tag_name: v${{ env.version }}
        release_name: Release v${{ env.version }}
        body: "Automated release from commit to main."
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release Artifacts
      if: vars.Releases != '_'
      shell: pwsh
      run: |
        $filesToUpload = @()
        foreach ($releasePath in '${{ vars.Releases }}'.Split([Environment]::NewLine))
        {
          if (![string]::IsNullOrWhiteSpace($releasePath))
          {
            $path = $releasePath.Trim()
            if (Test-Path $path) {
              $filesToUpload += (Get-ChildItem -Path $path -Recurse | ForEach-Object { $_.FullName })
            }
          }
        }

        foreach ($file in $filesToUpload)
        {
          Write-Host "Uploading $file to release"
          gh release upload "v${{ env.version }}" "$file" --clobber
        }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}